<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>عقد بيع سيارة - شاصيها</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cairo',sans-serif;
    background:#f5f5f5;
    padding:20px;
    color:#222;
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    background:linear-gradient(135deg,#ff7a00,#444);
    color:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.header h1{
    font-size:32px;
}

.card{
    background:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card h2{
    margin-bottom:15px;
    color:#ff7a00;
    font-size:22px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:6px;
    font-weight:600;
}

input,textarea{
    padding:12px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
    font-family:'Cairo',sans-serif;
}

textarea{
    min-height:100px;
    resize:vertical;
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn-save{
    background:#ff7a00;
    color:white;
}

.btn-save:hover{
    opacity:0.9;
}

.btn-pdf{
    background:#333;
    color:white;
}

.btn-pdf:hover{
    opacity:0.9;
}

.contract-preview{
    line-height:2.1;
    font-size:17px;
}

.highlight{
    color:#ff7a00;
    font-weight:bold;
}

#qrcode{
    margin-top:20px;
    display:flex;
    justify-content:center;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#777;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
    <h1>عقد بيع سيارة</h1>
    <p>منصة شاصيها</p>
</div>

<div class="card">

<h2>معلومات البائع والمشتري</h2>

<div class="grid">

<div class="input-group">
<label>اسم البائع</label>
<input type="text" id="seller">
</div>

<div class="input-group">
<label>اسم المشتري</label>
<input type="text" id="buyer">
</div>

<div class="input-group">
<label>رقم هاتف البائع</label>
<input type="text" id="sellerPhone">
</div>

<div class="input-group">
<label>رقم هاتف المشتري</label>
<input type="text" id="buyerPhone">
</div>

</div>

</div>

<div class="card">

<h2>معلومات السيارة</h2>

<div class="grid">

<div class="input-group">
<label>نوع السيارة</label>
<input type="text" id="car">
</div>

<div class="input-group">
<label>الموديل</label>
<input type="text" id="model">
</div>

<div class="input-group">
<label>رقم الشاصي VIN</label>
<input type="text" id="vin">
</div>

<div class="input-group">
<label>رقم اللوحة</label>
<input type="text" id="plate">
</div>

<div class="input-group">
<label>السعر</label>
<input type="text" id="price">
</div>

<div class="input-group">
<label>العداد</label>
<input type="text" id="mileage">
</div>

</div>

</div>

<div class="card">

<h2>ملاحظات</h2>

<div class="input-group">
<textarea id="notes">تم بيع السيارة على حالتها الحالية بعد المعاينة والفحص.</textarea>
</div>

</div>

<div class="card">

<h2>معاينة العقد</h2>

<div class="contract-preview" id="preview">

يرجى إدخال البيانات لعرض العقد...

</div>

<div id="qrcode"></div>

<div class="buttons">

<button class="btn-save" onclick="generateContract()">
تحديث العقد
</button>

<button class="btn-pdf" onclick="downloadPDF()">
تحميل PDF
</button>

</div>

</div>

<div class="footer">
جميع الحقوق محفوظة © شاصيها
</div>

</div>

<script>

function generateContract(){

const seller = document.getElementById('seller').value;
const buyer = document.getElementById('buyer').value;
const sellerPhone = document.getElementById('sellerPhone').value;
const buyerPhone = document.getElementById('buyerPhone').value;
const car = document.getElementById('car').value;
const model = document.getElementById('model').value;
const vin = document.getElementById('vin').value;
const plate = document.getElementById('plate').value;
const price = document.getElementById('price').value;
const mileage = document.getElementById('mileage').value;
const notes = document.getElementById('notes').value;

const today = new Date().toLocaleDateString('ar-IQ');

const contractText = `
تم الاتفاق بين الطرف الأول 
<span class="highlight">${seller}</span>
ورقم هاتفه 
<span class="highlight">${sellerPhone}</span>

وبين الطرف الثاني 
<span class="highlight">${buyer}</span>
ورقم هاتفه 
<span class="highlight">${buyerPhone}</span>

على بيع السيارة التالية:

السيارة:
<span class="highlight">${car}</span>

الموديل:
<span class="highlight">${model}</span>

رقم الشاصي:
<span class="highlight">${vin}</span>

رقم اللوحة:
<span class="highlight">${plate}</span>

السعر المتفق عليه:
<span class="highlight">${price}</span>

قراءة العداد:
<span class="highlight">${mileage}</span>

ملاحظات:
<span class="highlight">${notes}</span>

تاريخ العقد:
<span class="highlight">${today}</span>
`;

document.getElementById('preview').innerHTML = contractText;

document.getElementById('qrcode').innerHTML = "";

new QRCode(document.getElementById("qrcode"), {
    text: contractText,
    width: 140,
    height: 140
});

localStorage.setItem("contractData", JSON.stringify({
    seller,
    buyer,
    sellerPhone,
    buyerPhone,
    car,
    model,
    vin,
    plate,
    price,
    mileage,
    notes
}));

}

function downloadPDF(){

generateContract();

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

doc.setFont("Helvetica");

doc.setFontSize(18);

doc.text("Car Sale Contract", 20, 20);

doc.setFontSize(12);

const content = document.getElementById('preview').innerText;

const lines = doc.splitTextToSize(content, 170);

doc.text(lines, 20, 35);

doc.save("car-sale-contract.pdf");

}

window.onload = () => {

const data = JSON.parse(localStorage.getItem("contractData"));

if(data){

document.getElementById('seller').value = data.seller || "";
document.getElementById('buyer').value = data.buyer || "";
document.getElementById('sellerPhone').value = data.sellerPhone || "";
document.getElementById('buyerPhone').value = data.buyerPhone || "";
document.getElementById('car').value = data.car || "";
document.getElementById('model').value = data.model || "";
document.getElementById('vin').value = data.vin || "";
document.getElementById('plate').value = data.plate || "";
document.getElementById('price').value = data.price || "";
document.getElementById('mileage').value = data.mileage || "";
document.getElementById('notes').value = data.notes || "";

generateContract();

}
